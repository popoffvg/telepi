name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # npm Trusted Publishing currently requires Node 22.14.0+.
          node-version: 22.14
          cache: npm

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v
          # Trusted Publishing needs npm 11+, but the runner's bundled npm can lag.
          # Run npm 11 via npx instead of mutating the global install on the runner.
          npx --yes npm@11.10.0 -v

      - name: Verify tag matches package.json version
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const tag = process.env.GITHUB_REF_NAME;
          const expectedTag = `v${pkg.version}`;

          if (tag !== expectedTag) {
            console.error(`Tag ${tag} does not match package.json version ${pkg.version}. Expected ${expectedTag}.`);
            process.exit(1);
          }

          console.log(`Verified release tag ${tag}.`);
          EOF

      - name: Install dependencies
        run: npx --yes npm@11.10.0 ci

      - name: Run release CI
        run: |
          # npm calls inside ci:release script bodies still resolve to the runner's system npm on PATH,
          # not the npx npm@11 wrapper launched here. That's OK because only the publish step
          # requires npm 11.5.1+ for Trusted Publishing.
          npx --yes npm@11.10.0 run ci:release

      - name: Publish package to npm
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            npx --yes npm@11.10.0 publish --access public --tag next --provenance
          else
            npx --yes npm@11.10.0 publish --access public --provenance
          fi

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
